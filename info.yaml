# Tiny Tapeout project information
project:
  title:        "Two-Armed Bandit Analog-Equivalent Digital Chip"
  author:       "vermiscore"
  discord:      ""
  description:  "Digital reimplementation of analog 2AB bandit circuit using Thompson sampling LFSR and HAC accumulator"
  language:     "Verilog"
  clock_hz:     50000000
  tiles:        "1x1"
  top_module:   "tt_um_2ab_bandit"
  source_files:
    - "project.v"

pinout:
  ui[0]: "d_A (Arm-A result 1=Win 0=Lose)"
  ui[1]: "d_B (Arm-B result 1=Win 0=Lose)"
  ui[2]: "cfg[0] (DELTA step LSB)"
  ui[3]: "cfg[1]"
  ui[4]: "cfg[2]"
  ui[5]: "cfg[3] (DELTA step MSB)"
  ui[6]: "seed_ld (LFSR seed load strobe)"
  ui[7]: "seed_dat (LFSR seed serial data)"
  uo[0]: "SELECT (1=Arm-A 0=Arm-B)"
  uo[1]: "SELECT_N (complement)"
  uo[2]: "PHASE (0=COMPARE 1=LEARN)"
  uo[3]: "VALID (SELECT settled pulse)"
  uo[4]: "V_th[8] (HAC debug)"
  uo[5]: "V_th[9]"
  uo[6]: "V_th[10]"
  uo[7]: "V_th[11]"
  uio[0]: "V_th[0] (HAC debug LSB)"
  uio[1]: "V_th[1]"
  uio[2]: "V_th[2]"
  uio[3]: "V_th[3]"
  uio[4]: "V_th[4]"
  uio[5]: "V_th[5]"
  uio[6]: "V_th[6]"
  uio[7]: "V_th[7]"

yaml_version: 6
